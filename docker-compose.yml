version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: nightvibe_db
    restart: always
    environment:
      POSTGRES_DB: nightclub_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nightvibe_api
    restart: always
    env_file: ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: nightclub_db
      DB_USER: postgres
      DB_PASS: postgres
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nightvibe_web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
